# Scene registry — the extensible content layer.
# Add a scene = add one [[scene]] block here (or in any other content/*.toml). No code change.
#   backend = "ue"        -> your own assembled .umap level (set `map`), captured by TickCapture
#   backend = "unrealzoo" -> a UnrealZoo env binary by name (research-only), captured via UnrealCV
#   backend = "mock"      -> synthetic, for testing the pipeline without an engine
# Optional: viewpoints (fpv/tpv), license, tags, params (backend-specific).

[[scene]]
id = "mock"
backend = "mock"
viewpoints = ["tpv", "fpv"]
license = "self"

[[scene]]
id = "df_testroom"
backend = "ue"
map = "/Game/Maps/Capture"
viewpoints = ["fpv", "tpv"]
license = "self"
tags = ["placeholder", "primitives"]

# --- UnrealZoo scenes (research-only; run the env binary headless via scripts/unrealzoo_launch.sh) ---
[[scene]]
id = "uz_example"
backend = "unrealzoo"
viewpoints = ["fpv"]
license = "research-only"
tags = ["unrealzoo", "outdoor", "industrial"]   # the UE5 ExampleScene package default map

# Full UE5.6 package scenes (agent mode): `map` = the UnrealZoo env_name, loaded via
# `vset /action/game/level <map>` before the BP_Character is spawned and walked.
[[scene]]
id = "uz_containeryard"
backend = "unrealzoo"
map = "ContainerYard_Day"
viewpoints = ["fpv"]
license = "research-only"
tags = ["unrealzoo", "agent", "outdoor", "industrial"]

[[scene]]
id = "uz_downtown"
backend = "unrealzoo"
map = "DowntownWest"
viewpoints = ["fpv"]
license = "research-only"
tags = ["unrealzoo", "agent", "urban"]
