# Character registry — own-content (TickCapture) track. Adding a character = one [[character]] block.
#   url      = CC0 source glTF/GLB for autonomous fetch+ingest (scripts/fetch_character.sh <id> <url>)
#   mesh     = UE skeletal mesh asset path (filled in after ingest)
#   anim_bp  = locomotion AnimBlueprint (preferred) ; anim = single AnimSequence to loop (fallback)
#   wardrobe = optional modular slots (top/pants/shoes/hair/hat) -> mesh paths; sampled per episode
# This is for characters we IMPORT (self-sourced CC0 below; Mixamo/Fab need your login).
# The UnrealZoo research track does NOT use this (it gets 18 human + 28 animal looks via set_app).

# --- self-sourced CC0 (fetched + ingested autonomously, no login) ---
[[character]]
id = "cesiumman"
url = "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CesiumMan/glTF-Binary/CesiumMan.glb"
mesh = "/Game/DataFarm/Characters/cesiumman/CesiumMan.CesiumMan"
anim = "/Game/DataFarm/Characters/cesiumman/CesiumMan_Anim.CesiumMan_Anim"
standard_rig = "cesiumman"
license = "CC-BY-4.0"
tags = ["humanoid", "cc0-sample"]

[[character]]
id = "brainstem"
url = "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BrainStem/glTF-Binary/BrainStem.glb"
mesh = "/Game/DataFarm/Characters/brainstem/brainstem.brainstem"
anim = "/Game/DataFarm/Characters/brainstem/brainstem_Anim.brainstem_Anim"
standard_rig = "brainstem"
license = "CC-BY-4.0"
tags = ["robot", "cc0-sample"]

# --- Mixamo (fetched via scripts/mixamo_fetch.py with your token, imported by import_character.py) ---
[[character]]
id = "remy"
mesh = "/Game/DataFarm/Characters/remy/character.character"
anim = "/Game/DataFarm/Characters/remy/Anim/walking.walking"
standard_rig = "mixamorig"
license = "mixamo-account"
tags = ["humanoid", "mixamo"]

